name: Gatekeeper (Database CI)

on:
  pull_request:
    branches: [ main ]

jobs:
  database-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase Local (Verification)
        run: |
          # Initialize supabase if not already done
          if [ ! -d "supabase" ]; then
            supabase init
          fi
          
          # Move setup.sql to migrations if it exists to verify it
          if [ -f "supabase/setup.sql" ]; then
            mkdir -p supabase/migrations
            cp supabase/setup.sql supabase/migrations/0001_initial_schema.sql
          fi

          # Start supabase (includes running migrations)
          supabase db start

      - name: Verify Migration Success
        run: |
          # Verify the database schema matches what's expected
          # This ensures no syntax errors in the SQL files
          supabase db lint
